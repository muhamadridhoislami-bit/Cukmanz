<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Background</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    button:hover {
      background: rgba(0,0,0,0.8);
    }

    #gambar {
      background-image: url("https://picsum.photos/1920/1080");
    }
    
  </style>
</head>
<body>

<div>
  <div id="gambar">
    <link href="youtube.com">
    <p>
      gambar!
    </p>
  </div>
</div>
  

<button onclick="changeBackground()">Change Background</button>

<script src="https://giscus.app/client.js"
        data-repo="muhamadridhoislami-bit/Cukmanz"
        data-repo-id="R_kgDOSEAHgQ"
        data-category="General"
        data-category-id="DIC_kwDOSEAHgc4C8WUR"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="dark"
        data-lang="id"
        crossorigin="anonymous"
        async>
</script>
  
<script>
  function changeBackground() {
    const randomId = Math.floor(Math.random() * 1000);
    const url = `https://picsum.photos/id/${randomId}/1920/1080`;
    document.body.style.backgroundImage = `url('${url}')`;
  }

  // Optional: load one on start so it's not blank
  changeBackground();
</script>

</body>
</html>
